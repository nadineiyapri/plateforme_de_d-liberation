<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un débat - UVoice</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }
        .container {
            max-width: 580px;
            margin: 0 auto;
            background: white;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        h2 {
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 1.6rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            margin: 10px 0 16px 0;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            background: white;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #c4452c;
            box-shadow: 0 0 0 2px rgba(196,69,44,0.1);
        }
        button {
            background: #c4452c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 8px;
        }
        button:hover {
            background: #a3321c;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #475569;
            text-decoration: none;
            font-size: 0.85rem;
        }
        a:hover {
            color: #c4452c;
        }
        .flash-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Nouveau débat</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash-message">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    
    <form method="POST">
        <input type="text" name="titre" placeholder="Titre du débat" required>
        <textarea name="description" placeholder="Description (optionnelle)" rows="4"></textarea>
        <select name="id_theme" required>
            <option value="">-- Choisissez un thème --</option>
            {% for t in themes %}
            <option value="{{ t.id_theme }}">{{ t.nom_theme }}</option>
            {% endfor %}
        </select>
        <input type="datetime-local" name="date_limite">
        <button type="submit">Créer le débat</button>
    </form>
    <a href="{{ url_for('accueil') }}">Retour à l'accueil</a>
</div>
</body>
</html>
