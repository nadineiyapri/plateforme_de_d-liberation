<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un débat - UVoice</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.96);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h2 { color: #b23c1c; margin-top: 0; }
        input, textarea, select {
            width: 100%; padding: 12px; margin: 12px 0;
            border: 1px solid #f8bbd0; border-radius: 30px;
            box-sizing: border-box; background: #fffafb;
        }
        button {
            background: #c4452c; color: white; border: none;
            padding: 12px; border-radius: 30px; cursor: pointer;
            width: 100%; font-size: 16px; font-weight: bold;
        }
        a { display: block; text-align: center; margin-top: 20px; color: #b23c1c; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Nouveau débat</h2>
    <form method="POST">
        <input type="text" name="titre" placeholder="Titre du débat" required>
        <textarea name="description" placeholder="Description" rows="4"></textarea>
        <select name="id_theme">
            <option value="">Sans thème</option>
            {% for t in themes %}
            <option value="{{ t.id_theme }}">{{ t.nom_theme }}</option>
            {% endfor %}
        </select>
        <input type="datetime-local" name="date_limite">
        <button type="submit">Créer le débat</button>
    </form>
    <a href="{{ url_for('accueil') }}">Retour à l'accueil</a>
</div>
</body>
</html>
