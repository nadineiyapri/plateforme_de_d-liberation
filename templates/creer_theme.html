<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #fdfdfd; font-family: sans-serif; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h1 { color: #d32f2f; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Lancer un Débat</h1>
        <form method="POST">
            <input type="text" name="titre" placeholder="Titre du débat" required>
            <textarea name="description" placeholder="Description..."></textarea>
            <select name="id_theme">
                {% for t in themes %}
                <option value="{{ t.id_theme }}">{{ t.nom_theme }}</option>
                {% endfor %}
            </select>
            <input type="datetime-local" name="date_limite">
            <button type="submit" class="btn">Créer le débat</button>
        </form>
        <a href="/accueil" style="display:block; text-align:center; margin-top:15px; color:#999; text-decoration:none;">Retour</a>
    </div>
</body>
</html>
