<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ debat.titre }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #graphe-container { flex-grow: 1; background: #fafafa; position: relative; }
        svg { width: 100%; height: 100%; }

        /* Panneau Correctement Stylé */
        #panneau { display: none; position: fixed; right: 20px; top: 20px; width: 320px; background: white; 
                   padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; z-index: 1000; }
        
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; resize: none; }
        .btn-submit { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .btn-supprimer-classic { background: #fff5f5; color: #d32f2f; border: 1px solid #d32f2f; width: 100%; padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="graphe-container">
    <div style="position:absolute; top:20px; left:20px; z-index:10;">
        <a href="/accueil" style="text-decoration:none; color:#d32f2f; font-weight:bold;">← Retour</a>
        <h2 style="margin:10px 0;">{{ debat.titre }}</h2>
    </div>
    
    <svg id="graphe"></svg>

    <div id="panneau">
        <h3 id="panneau-titre" style="color:#d32f2f; margin-top:0;">Nouvel Argument</h3>
        
        <!-- Section Suppression Admin -->
        <div id="zone-suppr-arg" style="display: none;">
            <form id="form-delete-arg" method="POST" action="">
                <button type="submit" class="btn-supprimer-classic" onclick="return confirm('Supprimer cet argument ?')">Supprimer l'argument</button>
            </form>
            <hr>
        </div>

        <form method="POST" action="/debat/{{ debat.id_debat }}">
            <!-- CHAMP CRUCIAL : ID PARENT -->
            <input type="hidden" name="id_parent" id="input-parent" value="">
            
            <textarea name="texte" placeholder="Votre message..." required></textarea>
            
            <label style="display:block; margin-top:10px; font-size:12px;">Type :</label>
            <select name="type_arg" style="width:100%; padding:8px; border-radius:5px; margin-top:5px;">
                <option value="soutien" style="color:red; font-weight:bold;">Soutien (Rouge)</option>
                <option value="attaque" style="color:green; font-weight:bold;">Attaque (Vert)</option>
            </select>
            
            <button type="submit" class="btn-submit" {% if est_clos %}disabled{% endif %}>Publier</button>
            <button type="button" onclick="document.getElementById('panneau').style.display='none'" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">Fermer</button>
        </form>
    </div>
</div>

<script id="arbre-json" type="application/json">{{ arbre | tojson }}</script>
<script>
    const data = JSON.parse(document.getElementById('arbre-json').textContent);
    const svg = d3.select("#graphe");
    const container = document.getElementById('graphe-container');
    const width = container.clientWidth, height = container.clientHeight;

    const root = d3.hierarchy(data);
    const treeLayout = d3.tree().size([height - 100, width - 250]);
    treeLayout(root);

    const g = svg.append("g").attr("transform", "translate(120,50)");

    g.selectAll(".link").data(root.links()).enter().append("path")
     .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x))
     .attr("fill", "none").attr("stroke", "#ddd").attr("stroke-width", 2);

    const node = g.selectAll(".node").data(root.descendants()).enter().append("g")
     .attr("transform", d => `translate(${d.y},${d.x})`)
     .on("click", (event, d) => {
         const isRoot = d.data.id === "root";
         document.getElementById('panneau-titre').innerText = isRoot ? "Nouvel argument" : "Répondre";
         // L'ID parent est mis à jour ici pour que le formulaire sache à qui répondre
         document.getElementById('input-parent').value = isRoot ? "" : d.data.id;
         
         const zoneSuppr = document.getElementById('zone-suppr-arg');
         if (zoneSuppr) {
             zoneSuppr.style.display = isRoot ? "none" : "block";
             document.getElementById('form-delete-arg').action = "/argument/" + d.data.id + "/supprimer";
         }
         document.getElementById('panneau').style.display = 'block';
     });

    node.append("circle").attr("r", 10)
        .attr("fill", d => {
            if (d.data.id === "root") return "#8e44ad"; // Violet pour le centre
            return d.data.type === "soutien" ? "#d32f2f" : "#28a745"; // Soutien Rouge / Attaque Vert
        });

    node.append("text").attr("dy", 25).attr("text-anchor", "middle").style("font-size", "11px")
        .text(d => d.data.texte.substring(0,20));
</script>
</body>
</html>
