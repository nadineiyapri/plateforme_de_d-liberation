<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>UVoice - {{ debat.titre }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; }
        
        #graphe-container { width: 100vw; height: 100vh; position: relative; background: white; }
        svg { width: 100%; height: 100%; display: block; }
        
        /* Styles des liens (Fils) */
        .link { fill: none; stroke-width: 3px; opacity: 0.6; }
        .link-soutien { stroke: #2ecc71; } /* Vert */
        .link-attaque { stroke: #e74c3c; stroke-dasharray: 5,5; } /* Rouge */
        .link-root { stroke: #bdc3c7; }

        /* Styles des Noeuds (Cases) */
        .node rect { fill: white; stroke: #ccc; rx: 10; ry: 10; cursor: pointer; transition: 0.2s; }
        .node-root rect { fill: #2c3e50; stroke: #2c3e50; }
        .node text { font-size: 11px; fill: #333; pointer-events: none; text-anchor: middle; }
        .node-root text { fill: white !important; font-weight: bold; }
        .node .stats { font-size: 10px; fill: #7f8c8d; }

        /* Panneau latéral */
        #panneau { 
            display: none; position: fixed; right: 20px; top: 20px; width: 330px; 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); z-index: 1000; border: 1px solid #ddd; 
        }
        
        .vote-bar { display: flex; gap: 10px; margin: 15px 0; }
        .btn-v { flex: 1; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-like { background: #2ecc71; }
        .btn-dislike { background: #e74c3c; }
        
        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        .btn-send { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .badge-clos { position: absolute; top: 80px; left: 20px; background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div id="graphe-container">
    <div style="position:absolute; top:20px; left:20px; z-index:10;">
        <a href="{{ url_for('accueil') }}" style="text-decoration:none; color:#3498db; font-weight:bold;">← Accueil</a>
        <h2 style="margin:5px 0; color: #2c3e50;">{{ debat.titre }}</h2>
    </div>

    {% if est_clos %}
    <div class="badge-clos">🔒 Débat Clos</div>
    {% endif %}

    <svg id="graphe"></svg>

    <div id="panneau">
        <h4 style="margin:0 0 10px 0; color:#7f8c8d;">Argument sélectionné :</h4>
        <p id="full-text" style="background:#f8f9fa; padding:12px; border-radius:8px; font-size:13px; color:#2c3e50; line-height: 1.4;"></p>
        
        <div class="vote-bar" id="vote-controls">
            <form id="form-like" method="POST"><button type="submit" class="btn-v btn-like">👍 Like</button></form>
            <form id="form-dislike" method="POST"><button type="submit" class="btn-v btn-dislike">👎 Dislike</button></form>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        {% if not est_clos %}
        <h4 style="margin:0 0 10px 0;">Répondre</h4>
        <form method="POST">
            <input type="hidden" name="id_parent" id="input-parent">
            <textarea name="texte" placeholder="Votre réponse..." required></textarea>
            <select name="type_arg" style="width:100%; padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid #ddd;">
                <option value="soutien">🚩 Soutien (Lien Vert)</option>
                <option value="attaque">⚔️ Attaque (Lien Rouge)</option>
            </select>
            <button type="submit" class="btn-send">Publier l'argument</button>
        </form>
        {% endif %}
        
        <button type="button" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer;" onclick="document.getElementById('panneau').style.display='none'">Fermer</button>
    </div>
</div>

<script id="arbre-json" type="application/json">{{ arbre | tojson }}</script>

<script>
    const treeData = JSON.parse(document.getElementById('arbre-json').textContent);
    const svg = d3.select("#graphe");
    const container = document.getElementById('graphe-container');
    const width = container.clientWidth, height = container.clientHeight;

    const mainGroup = svg.append("g");

    // Zoom & Pan
    const zoomBehavior = d3.zoom()
        .scaleExtent([0.1, 3])
        .on("zoom", (event) => mainGroup.attr("transform", event.transform));
    svg.call(zoomBehavior);

    const root = d3.hierarchy(treeData);
    const treeLayout = d3.tree().nodeSize([120, 300]); 
    treeLayout(root);

    // 1. DESSIN DES LIENS (FILS)
    mainGroup.selectAll(".link")
        .data(root.links())
        .enter().append("path")
        .attr("class", d => `link ${d.target.data.type === 'soutien' ? 'link-soutien' : d.target.data.type === 'attaque' ? 'link-attaque' : 'link-root'}`)
        .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

    // 2. DESSIN DES NOEUDS (CASES)
    const nodes = mainGroup.selectAll(".node")
        .data(root.descendants())
        .enter().append("g")
        .attr("class", d => "node " + (d.data.id === "root" ? "node-root" : ""))
        .attr("transform", d => `translate(${d.y},${d.x})`)
        .on("click", (event, d) => {
            event.stopPropagation();
            const isRoot = d.data.id === "root";
            
            document.getElementById('full-text').innerText = d.data.texte;
            document.getElementById('input-parent').value = isRoot ? "root" : d.data.id;
            
            if(!isRoot) {
                document.getElementById('vote-controls').style.display = 'flex';
                document.getElementById('form-like').action = `/vote_argument/${d.data.id}/1`;
                document.getElementById('form-dislike').action = `/vote_argument/${d.data.id}/-1`;
            } else {
                document.getElementById('vote-controls').style.display = 'none';
            }
            document.getElementById('panneau').style.display = 'block';
        });

    nodes.append("rect").attr("x", -100).attr("y", -35).attr("width", 200).attr("height", 70);

    nodes.append("text").attr("dy", -5)
        .text(d => d.data.texte.length > 25 ? d.data.texte.substring(0, 22) + "..." : d.data.texte);

    nodes.append("text").attr("class", "stats").attr("dy", 15)
        .text(d => d.data.id === "root" ? "" : `Score: ${d.data.score || 0}`);

    const initialTransform = d3.zoomIdentity.translate(150, height / 2).scale(0.8);
    svg.call(zoomBehavior.transform, initialTransform);

    svg.on("click", () => document.getElementById('panneau').style.display = 'none');
</script>
</body>
</html>
