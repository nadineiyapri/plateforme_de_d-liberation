<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ debat.titre }} - UVoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .top-bar { padding: 15px 30px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        #graphe-container { flex-grow: 1; position: relative; background: #fafafa; }
        #graphe { width: 100%; height: 100%; }

        /* Panneau flottant propre */
        #panneau { display: none; position: fixed; right: 20px; top: 80px; width: 320px; background: white; 
                   border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 20px; border: 1px solid #eee; }

        .status-banner { background: #fff5f5; color: #d32f2f; text-align: center; padding: 10px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #f5c6cb; }

        .btn-vote { padding: 8px 16px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
        .btn-vote:hover:not(:disabled) { background: #f0f0f0; }

        .btn-supprimer-classic { background: #fff5f5; color: #c0392b; border: 1px solid #f5c6cb; padding: 8px; width: 100%; 
                                 border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }

        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 6px; padding: 10px; box-sizing: border-box; resize: none; }
        .btn-submit { background: #d32f2f; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-submit:disabled { background: #ccc; }
    </style>
</head>
<body>

{% set est_clos = (debat.statut != 'ouvert') or (debat.date_limite and maintenant > debat.date_limite) %}

{% if est_clos %}
<div class="status-banner">Ce débat est clos. Les contributions sont désactivées.</div>
{% endif %}

<div class="top-bar">
    <div>
        <a href="/accueil" style="text-decoration:none; color:#999; font-size: 14px;">← Retour</a>
        <h2 style="margin: 5px 0 0 0;">{{ debat.titre }}</h2>
    </div>
    
    <div style="display: flex; gap: 10px;">
        <form action="{{ url_for('voter', id_debat=debat.id_debat) }}" method="POST">
            <button type="submit" name="choix" value="pour" class="btn-vote" style="color: #28a745;" {% if est_clos %}disabled{% endif %}>Pour ({{ pour }})</button>
            <button type="submit" name="choix" value="contre" class="btn-vote" style="color: #dc3545;" {% if est_clos %}disabled{% endif %}>Contre ({{ contre }})</button>
        </form>
    </div>
</div>

<div id="graphe-container">
    <svg id="graphe"></svg>

    <!-- PANNEAU -->
    <div id="panneau">
        <h4 id="panneau-titre" style="margin-top:0;">Répondre</h4>
        
        <div id="zone-suppr-arg" style="display: none;">
            {% if user.role in ['admin', 'prof'] %}
            <form id="form-delete-arg" method="POST" action="">
                <button type="submit" class="btn-supprimer-classic" onclick="return confirm('Supprimer cet argument ?')">Supprimer l'argument</button>
            </form>
            <hr style="border:0; border-top:1px solid #eee; margin-bottom:15px;">
            {% endif %}
        </div>

        <form method="POST" action="/debat/{{ debat.id_debat }}">
            <input type="hidden" name="id_parent" id="input-parent">
            <textarea name="texte" placeholder="Votre argument..." required></textarea>
            
            <label style="display:block; margin-top:10px; font-size:12px; color:#666;">Type de réponse :</label>
            <select name="type_arg" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd;">
                <option value="soutien">Soutien (Vert)</option>
                <option value="attaque">Attaque (Rouge)</option>
            </select>
            
            <button type="submit" class="btn-submit" {% if est_clos %}disabled{% endif %}>Publier l'argument</button>
            <button type="button" onclick="document.getElementById('panneau').style.display='none'" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">Annuler</button>
        </form>
    </div>
</div>

<script id="arbre-json" type="application/json">{{ arbre | tojson }}</script>
<script>
    const data = JSON.parse(document.getElementById('arbre-json').textContent);
    const svg = d3.select("#graphe");
    const container = document.getElementById('graphe-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const root = d3.hierarchy(data);
    const treeLayout = d3.tree().size([height - 100, width - 200]);
    treeLayout(root);

    const g = svg.append("g").attr("transform", "translate(100,50)");

    g.selectAll(".link").data(root.links()).enter().append("path")
     .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x))
     .attr("fill", "none").attr("stroke", "#eee").attr("stroke-width", 2);

    cconst node = g.selectAll(".node")
    .data(root.descendants())
    .enter().append("g")
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .style("cursor", "pointer")
    .on("click", (event, d) => {
        // ... (ton code de clic existant pour ouvrir le panneau)
    });

// 2. C'est ICI qu'on définit la couleur des boules
node.append("circle")
    .attr("r", 10)
    .attr("fill", d => {
        if (d.data.id === "root") return "#8e44ad"; // Le centre (sujet) reste en VIOLET
        
        // INVERSION DEMANDÉE :
        // Si c'est un soutien -> ROUGE (#d32f2f)
        // Si c'est une attaque -> VERT (#28a745)
        return d.data.type === "soutien" ? "#d32f2f" : "#28a745";
    })
    .attr("stroke", "#fff")
    .attr("stroke-width", 2);

// 3. Le texte sous les boules
node.append("text")
    .attr("dy", 25)
    .attr("text-anchor", "middle")
    .style("font-size", "12px")
    .style("fill", "#555")
    .text(d => d.data.texte.substring(0, 20) + "...");
</script>

</body>
</html>
