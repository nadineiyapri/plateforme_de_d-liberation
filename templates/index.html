<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>UVoice - Débats universitaires</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .welcome-card {
            background: rgba(255,255,255,0.96);
            border-radius: 40px;
            max-width: 500px;
            width: 100%;
            padding: 40px 35px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 { font-size: 3rem; color: #b23c1c; margin-bottom: 10px; }
        .tagline { font-size: 1.2rem; color: #c4452c; margin-bottom: 30px; border-bottom: 2px solid #ffcdd2; display: inline-block; padding-bottom: 5px; }
        .sub { color: #6d4c41; margin-bottom: 30px; font-size: 0.95rem; }
        input, select {
            width: 100%; padding: 14px 18px; margin: 12px 0;
            border: 1px solid #ffcdd2; border-radius: 60px;
            font-size: 1rem; background: #fffafb;
        }
        button {
            background: #c4452c; color: white; border: none;
            padding: 14px; width: 100%; border-radius: 60px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        .quote { margin-top: 30px; font-style: italic; color: #b23c1c; border-top: 1px solid #ffe0e0; padding-top: 20px; }
    </style>
</head>
<body>
<div class="welcome-card">
    <h1>🎙️ UVoice</h1>
    <div class="tagline">Make Your Voice Heard</div>
    <div class="sub">Plateforme de débat universitaire – argumentez, convainquez, évoluez.</div>
    <form method="POST">
        <input type="text" name="nom" placeholder="Nom" required>
        <input type="text" name="prenom" placeholder="Prénom" required>
        <select name="role">
            <option value="etudiant">Étudiant</option>
            <option value="prof">Professeur</option>
            <option value="admin">Administrateur</option>
        </select>
        <button type="submit">🎧 Entrer dans l’arène</button>
    </form>
    <div class="quote">« Le débat est la forge de la pensée. »</div>
</div>
</body>
</html>
