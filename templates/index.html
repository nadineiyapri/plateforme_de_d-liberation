<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>UVoice - Débats universitaires</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .welcome-card {
            background: white;
            border-radius: 24px;
            max-width: 460px;
            width: 100%;
            padding: 40px 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        h1 { font-size: 2.5rem; color: #c4452c; margin-bottom: 8px; }
        .tagline { font-size: 1rem; color: #475569; margin-bottom: 28px; border-bottom: 1px solid #e2e8f0; display: inline-block; padding-bottom: 6px; }
        .sub { color: #64748b; margin-bottom: 30px; font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 12px 16px; margin: 10px 0;
            border: 1px solid #cbd5e1; border-radius: 40px;
            font-size: 0.9rem; background: white;
        }
        button {
            background: #c4452c; color: white; border: none;
            padding: 12px; width: 100%; border-radius: 40px;
            font-size: 1rem; font-weight: 500; cursor: pointer;
        }
        .quote { margin-top: 30px; font-style: italic; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="welcome-card">
    <h1>UVoice</h1>
    <div class="tagline">Make Your Voice Heard</div>
    <div class="sub">Plateforme de débat universitaire</div>
    <form method="POST">
        <input type="text" name="nom" placeholder="Nom" required>
        <input type="text" name="prenom" placeholder="Prénom" required>
        <select name="role">
            <option value="etudiant">Étudiant</option>
            <option value="prof">Professeur</option>
            <option value="admin">Administrateur</option>
        </select>
        <button type="submit">Entrer</button>
    </form>
    <div class="quote">« Le débat est la forge de la pensée. »</div>
</div>
</body>
</html>
